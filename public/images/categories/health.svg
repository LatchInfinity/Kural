<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E8449"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.08)"/>
    </pattern>
    <pattern id="stripes" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="30" height="60" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <rect width="800" height="450" fill="url(#stripes)"/>
  <text x="400" y="200" font-family="'Segoe UI Emoji','Apple Color Emoji',sans-serif" font-size="80" text-anchor="middle" dominant-baseline="middle">🏥</text>
  <text x="400" y="290" font-family="'Noto Sans Tamil',-apple-system,BlinkMacSystemFont,sans-serif" font-size="44" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">சுகாதாரம்</text>
  <text x="400" y="325" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">KURAL NEWS</text>
  <rect x="0" y="440" width="800" height="10" fill="rgba(255,255,255,0.1)"/>
</svg>